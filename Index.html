
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.dash{padding:1rem 0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.topbar h1{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 14px;font-size:13px;cursor:pointer;color:var(--color-text-primary);display:flex;align-items:center;gap:6px}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info)}

.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.scard{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.875rem 1rem}
.scard .sl{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.scard .sv{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.scard .ss{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

.stock-grid{display:flex;flex-direction:column;gap:10px}
.stock-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.15s}
.stock-card:hover{border-color:var(--color-border-secondary)}
.stock-card.expanded{border-color:var(--color-border-primary)}

.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sc-left{flex:1;min-width:180px}
.sc-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.sc-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

.sc-right{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.sc-price-block{text-align:right}
.sc-cmp{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.sc-change{font-size:12px;margin-top:2px}
.pos{color:var(--color-text-success)} .neg{color:var(--color-text-danger)} .neu{color:var(--color-text-secondary)}

.verdict-badge{font-size:11px;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500;white-space:nowrap}
.v-sbuy{background:var(--color-background-success);color:var(--color-text-success)}
.v-buy{background:#eaf3de;color:#3b6d11}
.v-acc{background:var(--color-background-warning);color:var(--color-text-warning)}
.v-hold{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.v-avoid{background:var(--color-background-danger);color:var(--color-text-danger)}

.zone-bar-wrap{width:100%;margin:10px 0 4px}
.zone-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:5px}
.zone-bar{position:relative;height:8px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);overflow:visible}
.zone-fill{position:absolute;top:0;left:0;height:100%;border-radius:4px}
.zone-needle{position:absolute;top:-4px;width:3px;height:16px;border-radius:2px;background:var(--color-text-primary);transform:translateX(-50%);z-index:2}
.zone-needle-label{position:absolute;top:14px;font-size:10px;font-weight:500;color:var(--color-text-primary);transform:translateX(-50%);white-space:nowrap}

.price-zones{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.pz{border-radius:var(--border-radius-md);padding:7px 8px;text-align:center}
.pz .pz-l{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px}
.pz .pz-v{font-size:13px;font-weight:500}
.pz-sbuy{background:#eaf3de} .pz-sbuy .pz-l{color:#3b6d11} .pz-sbuy .pz-v{color:#3b6d11}
.pz-buy{background:#f0f7e6} .pz-buy .pz-l{color:#639922} .pz-buy .pz-v{color:#639922}
.pz-hold{background:var(--color-background-warning)} .pz-hold .pz-l{color:var(--color-text-warning)} .pz-hold .pz-v{color:var(--color-text-warning)}
.pz-avoid{background:var(--color-background-danger)} .pz-avoid .pz-l{color:var(--color-text-danger)} .pz-avoid .pz-v{color:var(--color-text-danger)}

.pz.active-zone{border:1.5px solid currentColor}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.detail-row:last-child{border-bottom:none}
.dl{color:var(--color-text-secondary)}
.dv{font-weight:500;color:var(--color-text-primary);text-align:right}

.conviction-dots{display:flex;gap:4px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%}
.dot.filled-g{background:#639922} .dot.filled-a{background:#BA7517} .dot.filled-r{background:#E24B4A} .dot.empty{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary)}

.bullets{margin:10px 0 0;padding:0;list-style:none}
.bullets li{font-size:12px;color:var(--color-text-secondary);padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.bullets li:last-child{border-bottom:none}
.bi{color:var(--color-text-success);font-size:14px;flex-shrink:0}
.bi.warn{color:var(--color-text-warning)} .bi.danger{color:var(--color-text-danger)}

.alert-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);margin-top:6px}
.alert-tag.warn{background:var(--color-background-warning);color:var(--color-text-warning);border-color:var(--color-border-warning)}
.alert-tag.fire{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}

.eps-table{width:100%;margin-top:10px;font-size:12px;border-collapse:collapse}
.eps-table th{text-align:left;font-weight:500;color:var(--color-text-secondary);padding:5px 8px;background:var(--color-background-secondary);font-size:11px}
.eps-table td{padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.eps-table td.g{color:#3b6d11;font-weight:500} .eps-table td.a{color:#BA7517} .eps-table td.r{color:#E24B4A}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;width:90%;max-width:480px}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.form-row textarea{height:72px;resize:vertical}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

.tab-row{display:flex;gap:4px;margin-bottom:10px;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px}
.tab-btn{background:none;border:none;padding:4px 12px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);border-radius:var(--border-radius-md)}
.tab-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}

.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:4px;border-radius:var(--border-radius-md)}
.del-btn:hover{color:var(--color-text-danger);background:var(--color-background-danger)}

.refresh-time{font-size:11px;color:var(--color-text-secondary)}
</style>

<h2 class="sr-only">Value investing watchlist dashboard with buy zone alerts for SGSIL and Emami</h2>

<div class="dash">
<div class="topbar">
  <div>
    <h1><i class="ti ti-chart-bar" aria-hidden="true"></i> Rakesh's Value Dashboard</h1>
    <p class="refresh-time" id="refresh-time"></p>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Add Stock</button>
    <button class="btn" onclick="refreshPrices()"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button>
  </div>
</div>

<div class="summary-row" id="summary-row"></div>

<div id="stock-grid" class="stock-grid"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3><i class="ti ti-plus" aria-hidden="true"></i> Add stock to watchlist</h3>
    <div class="form-row"><label>Stock name</label><input id="f-name" placeholder="e.g. HDFC Bank"/></div>
    <div class="form-row"><label>Ticker / BSE code</label><input id="f-ticker" placeholder="e.g. HDFCBANK"/></div>
    <div class="form-row"><label>Current market price (₹)</label><input id="f-cmp" type="number" placeholder="e.g. 1650"/></div>
    <div class="form-row"><label>Intrinsic value estimate (₹)</label><input id="f-iv" type="number" placeholder="e.g. 2100"/></div>
    <div class="form-row"><label>Strong buy trigger (₹)</label><input id="f-sbuy" type="number" placeholder="e.g. 1450"/></div>
    <div class="form-row"><label>Buy zone (₹)</label><input id="f-buy" type="number" placeholder="e.g. 1580"/></div>
    <div class="form-row"><label>Hold / exit zone (₹)</label><input id="f-hold" type="number" placeholder="e.g. 2050"/></div>
    <div class="form-row"><label>FY26 EPS (₹)</label><input id="f-eps26" type="number" placeholder="e.g. 5.03"/></div>
    <div class="form-row"><label>FY27E EPS (₹)</label><input id="f-eps27" type="number" placeholder="e.g. 6.0"/></div>
    <div class="form-row"><label>FY28E EPS (₹)</label><input id="f-eps28" type="number" placeholder="e.g. 7.1"/></div>
    <div class="form-row"><label>Conviction (1–5)</label><select id="f-conv"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
    <div class="form-row"><label>Key thesis (one line)</label><textarea id="f-thesis" placeholder="Why you own this stock..."></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addStock()">Add to watchlist ↗</button>
    </div>
  </div>
</div>

<script>
const STOCKS = [
  {
    id:'sgsil', name:'Saint-Gobain Sekurit India', ticker:'BSE 515043', sector:'Auto Components',
    cmp:107, iv:145, sbuy:88, buy:108, hold:130, avoid:155,
    eps:{fy26:5.03, fy27b:5.75, fy27bull:6.50, fy27bear:5.20, fy28b:7.10, fy28bull:8.00, fy28bear:5.90, fy29b:8.50},
    div:2.5, roce:22, roe:21, debt:'~Zero', conviction:4,
    verdict:'acc',
    thesis:'Debt-free auto glass specialist. Profit CAGR 39% over 5 years. Operating leverage on OEM premiumisation paying off. No one-off gains — fundamental margin expansion confirmed.',
    bulls:['PAT grew 27% in FY26 on 17% revenue growth — pure operating leverage','Gross margin structurally expanding — input costs easing','SUV/EV mix shift = higher revenue per car without volume dependency','Parent Saint-Gobain India committing ₹6,000–8,000 Cr capex in India'],
    bears:['AIS holds 70%+ market share — structural ceiling','Single plant (Chakan) — zero geographic hedge','Working capital days ballooned to 336 — watch CFO conversion','No broker coverage, micro-cap illiquidity'],
    catalyst:'Q1 FY27 results (Aug 2026) — confirm revenue 10%+ growth. AGM Jul 30.',
    peRange:{low:18,mid:22,high:27}
  },
  {
    id:'emami', name:'Emami Limited', ticker:'NSE EMAMILTD · BSE 531162', sector:'FMCG / Personal Care',
    cmp:432, iv:650, sbuy:390, buy:445, hold:530, avoid:700,
    eps:{fy26:17.76, fy27b:20.5, fy27bull:23.0, fy27bear:17.0, fy28b:24.5, fy28bull:28.0, fy28bear:19.0, fy29b:29.0},
    div:10, roce:38, roe:29, debt:'~Zero', conviction:3,
    verdict:'acc',
    thesis:'7 category-leading Ayurvedic brands at trough PE of 24x vs 5Y avg 35-40x. FY26 soft due to weather + West Asia — not structural. Gross margin 69.9% intact. AA- credit rating.',
    bulls:['AA- credit rating (CARE + CRISIL) — independently certified quality','Gross margin expanded 130bps to 69.9% even in weak revenue year','MF holding rose from 21.87% → 22.97% — institutions buying dip','Dividend raised to ₹10 in a soft year — management conviction signal'],
    bears:['5Y revenue CAGR only 5-6% — below premium FMCG expectation','FY26 revenue declined 0.8% — first decline in 5+ years','IncNut + Axiom acquisitions loss-making — integration risk','West Asia geopolitical hit to 18% international revenues'],
    catalyst:'Q1 FY27 summer results (Aug 2026) — binary test. Strong summer = re-rating.',
    peRange:{low:20,mid:27,high:35}
  }
];

let stocks = [...STOCKS];
let expanded = {};

function getZone(s){
  const p = s.cmp;
  if(p <= s.sbuy) return 'sbuy';
  if(p <= s.buy) return 'buy';
  if(p <= s.hold) return 'hold';
  return 'avoid';
}

function getZoneLabel(z){
  return {sbuy:'Strong Buy',buy:'Buy',hold:'Accumulate / Hold',avoid:'Reduce / Avoid'}[z]||z;
}

function verdictBadge(s){
  const z = getZone(s);
  const map = {sbuy:['v-sbuy','Strong Buy'],buy:['v-buy','Buy'],hold:['v-acc','Accumulate'],avoid:['v-hold','Hold / Watch']};
  const [cls,lbl] = map[z]||['v-hold','Hold'];
  return `<span class="verdict-badge ${cls}">${lbl}</span>`;
}

function alertTag(s){
  const z = getZone(s);
  if(z==='sbuy') return `<span class="alert-tag fire"><i class="ti ti-bell" aria-hidden="true"></i> Heavy buy trigger active — CMP ₹${s.cmp} ≤ Strong Buy ₹${s.sbuy}</span>`;
  if(z==='buy') return `<span class="alert-tag"><i class="ti ti-bell" aria-hidden="true"></i> In buy zone — CMP ₹${s.cmp} ≤ Buy ₹${s.buy}</span>`;
  const mos = Math.round(((s.sbuy - s.cmp)/s.cmp)*100);
  const pct = Math.abs(mos);
  return `<span class="alert-tag warn"><i class="ti ti-arrow-down" aria-hidden="true"></i> ${pct}% away from strong buy trigger ₹${s.sbuy}</span>`;
}

function mosPercent(s){
  return Math.round(((s.iv - s.cmp)/s.iv)*100);
}

function convDots(n,max=5){
  let h='';
  for(let i=1;i<=max;i++){
    const cls = i<=n ? (n>=4?'filled-g':n>=3?'filled-a':'filled-r') : 'empty';
    h+=`<div class="dot ${cls}"></div>`;
  }
  return `<div class="conviction-dots">${h}</div>`;
}

function peNow(s){ return (s.cmp/s.eps.fy26).toFixed(1); }
function pe27(s){ return (s.cmp/s.eps.fy27b).toFixed(1); }
function pe28(s){ return (s.cmp/s.eps.fy28b).toFixed(1); }
function tgt27(s){ return Math.round(s.eps.fy27b * s.peRange.mid); }
function tgt28(s){ return Math.round(s.eps.fy28b * s.peRange.mid); }
function upside(s){ return Math.round(((tgt28(s)-s.cmp)/s.cmp)*100); }

function zoneBarHTML(s){
  const lo = Math.min(s.sbuy*0.85, s.cmp*0.85);
  const hi = Math.max(s.avoid*1.1, s.cmp*1.1);
  const range = hi - lo;
  const sbuyPct = ((s.sbuy-lo)/range*100).toFixed(1);
  const buyPct = ((s.buy-lo)/range*100).toFixed(1);
  const holdPct = ((s.hold-lo)/range*100).toFixed(1);
  const avoidPct = ((s.avoid-lo)/range*100).toFixed(1);
  const cmpPct = Math.min(99,Math.max(1,((s.cmp-lo)/range*100))).toFixed(1);
  const ivPct = Math.min(99,Math.max(1,((s.iv-lo)/range*100))).toFixed(1);
  return `
<div class="zone-bar-wrap">
  <div class="zone-bar-label"><span>₹${Math.round(lo)}</span><span>Price zones</span><span>₹${Math.round(hi)}</span></div>
  <div class="zone-bar">
    <div class="zone-fill" style="width:${sbuyPct}%;background:#639922;opacity:0.25"></div>
    <div class="zone-fill" style="left:${sbuyPct}%;width:${buyPct-sbuyPct}%;background:#97C459;opacity:0.25"></div>
    <div class="zone-fill" style="left:${buyPct}%;width:${holdPct-buyPct}%;background:#EF9F27;opacity:0.25"></div>
    <div class="zone-fill" style="left:${holdPct}%;width:${100-holdPct}%;background:#E24B4A;opacity:0.2"></div>
    <div class="zone-needle" style="left:${cmpPct}%" title="CMP ₹${s.cmp}"><div class="zone-needle-label">₹${s.cmp}</div></div>
    <div class="zone-needle" style="left:${ivPct}%;background:#185FA5;opacity:0.7" title="IV ₹${s.iv}"><div class="zone-needle-label" style="color:#185FA5">IV ₹${s.iv}</div></div>
  </div>
</div>`;
}

function pzActive(zone,target){
  return zone===target?' active-zone':'';
}

function renderCard(s){
  const z = getZone(s);
  const mos = mosPercent(s);
  const isOpen = expanded[s.id];
  return `
<div class="stock-card${isOpen?' expanded':''}" id="card-${s.id}">
  <div onclick="toggleCard('${s.id}')" style="cursor:pointer">
    <div class="sc-top">
      <div class="sc-left">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="sc-name">${s.name}</span>
          ${verdictBadge(s)}
        </div>
        <div class="sc-meta">${s.ticker} · ${s.sector}</div>
        ${alertTag(s)}
      </div>
      <div class="sc-right">
        <div class="sc-price-block">
          <div class="sc-cmp">₹${s.cmp}</div>
          <div class="sc-change neu" style="font-size:12px">IV ₹${s.iv} · MoS ${mos}%</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${convDots(s.conviction)}
          <span style="font-size:11px;color:var(--color-text-secondary)">conviction</span>
        </div>
        <button class="del-btn" onclick="event.stopPropagation();deleteStock('${s.id}')" aria-label="Remove stock"><i class="ti ti-trash" aria-hidden="true"></i></button>
        <i class="ti ${isOpen?'ti-chevron-up':'ti-chevron-down'}" aria-hidden="true" style="font-size:16px;color:var(--color-text-secondary);margin-top:2px"></i>
      </div>
    </div>
    ${zoneBarHTML(s)}
  </div>

  ${isOpen ? `
  <div style="margin-top:4px">
    <div class="tab-row" id="tabs-${s.id}">
      <button class="tab-btn active" onclick="switchTab('${s.id}','zones',event)">Zones</button>
      <button class="tab-btn" onclick="switchTab('${s.id}','eps',event)">EPS & PE</button>
      <button class="tab-btn" onclick="switchTab('${s.id}','thesis',event)">Thesis</button>
    </div>

    <div id="tab-zones-${s.id}">
      <div class="price-zones">
        <div class="pz pz-sbuy${pzActive(z,'sbuy')}"><div class="pz-l">Strong Buy</div><div class="pz-v">≤ ₹${s.sbuy}</div></div>
        <div class="pz pz-buy${pzActive(z,'buy')}"><div class="pz-l">Buy</div><div class="pz-v">₹${s.sbuy+1}–${s.buy}</div></div>
        <div class="pz pz-hold${pzActive(z,'hold')}"><div class="pz-l">Accumulate</div><div class="pz-v">₹${s.buy+1}–${s.hold}</div></div>
        <div class="pz pz-avoid${pzActive(z,'avoid')}"><div class="pz-l">Reduce</div><div class="pz-v">> ₹${s.hold}</div></div>
      </div>
      <div class="detail-grid">
        <div>
          <div class="detail-row"><span class="dl">CMP</span><span class="dv">₹${s.cmp}</span></div>
          <div class="detail-row"><span class="dl">Intrinsic value</span><span class="dv" style="color:#185FA5">₹${s.iv}</span></div>
          <div class="detail-row"><span class="dl">Margin of safety</span><span class="dv" style="color:#3b6d11">${mos}%</span></div>
          <div class="detail-row"><span class="dl">Dividend (FY26)</span><span class="dv">₹${s.div}/share</span></div>
        </div>
        <div>
          <div class="detail-row"><span class="dl">ROCE</span><span class="dv">~${s.roce}%</span></div>
          <div class="detail-row"><span class="dl">ROE</span><span class="dv">~${s.roe}%</span></div>
          <div class="detail-row"><span class="dl">Debt / Equity</span><span class="dv">${s.debt}</span></div>
          <div class="detail-row"><span class="dl">Catalyst</span><span class="dv" style="font-size:11px;white-space:normal">${s.catalyst}</span></div>
        </div>
      </div>
    </div>

    <div id="tab-eps-${s.id}" style="display:none">
      <table class="eps-table" aria-label="EPS and PE projection table for ${s.name}">
        <thead><tr><th>Year</th><th>EPS Bear</th><th>EPS Base</th><th>EPS Bull</th><th>PE at CMP</th><th>Price @ ${s.peRange.mid}x</th></tr></thead>
        <tbody>
          <tr>
            <td>FY26 ✓</td>
            <td>—</td>
            <td class="g">₹${s.eps.fy26}</td>
            <td>—</td>
            <td class="a">${peNow(s)}x</td>
            <td>₹${Math.round(s.eps.fy26*s.peRange.mid)}</td>
          </tr>
          <tr>
            <td>FY27E</td>
            <td class="r">₹${s.eps.fy27bear}</td>
            <td class="g">₹${s.eps.fy27b}</td>
            <td class="g">₹${s.eps.fy27bull}</td>
            <td class="g">${pe27(s)}x</td>
            <td>₹${tgt27(s)}</td>
          </tr>
          <tr>
            <td>FY28E</td>
            <td class="r">₹${s.eps.fy28bear}</td>
            <td class="g">₹${s.eps.fy28b}</td>
            <td class="g">₹${s.eps.fy28bull}</td>
            <td class="g">${pe28(s)}x</td>
            <td>₹${tgt28(s)}</td>
          </tr>
          <tr>
            <td>FY29E</td>
            <td>—</td>
            <td class="g">₹${s.eps.fy29b}</td>
            <td>—</td>
            <td class="g">${(s.cmp/s.eps.fy29b).toFixed(1)}x</td>
            <td>₹${Math.round(s.eps.fy29b*s.peRange.mid)}</td>
          </tr>
        </tbody>
      </table>
      <div style="margin-top:10px;padding:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)">
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">3-year base case return (FY28E @ ${s.peRange.mid}x)</div>
        <div style="font-size:20px;font-weight:500;color:${upside(s)>0?'#3b6d11':'#E24B4A'}">+${upside(s)}% from ₹${s.cmp}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">Target ₹${tgt28(s)} · excl. dividends · ${s.peRange.low}x–${s.peRange.high}x PE range</div>
      </div>
    </div>

    <div id="tab-thesis-${s.id}" style="display:none">
      <p style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:8px">${s.thesis}</p>
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary);margin-bottom:4px">Bulls</div>
      <ul class="bullets">
        ${s.bulls.map(b=>`<li><span class="bi"><i class="ti ti-circle-check" aria-hidden="true"></i></span>${b}</li>`).join('')}
      </ul>
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary);margin:8px 0 4px">Bears</div>
      <ul class="bullets">
        ${s.bears.map(b=>`<li><span class="bi warn"><i class="ti ti-alert-triangle" aria-hidden="true"></i></span>${b}</li>`).join('')}
      </ul>
    </div>
  </div>` : ''}
</div>`;
}

function renderSummary(){
  const total = stocks.length;
  const inBuyZone = stocks.filter(s=>['sbuy','buy'].includes(getZone(s))).length;
  const avgMos = Math.round(stocks.reduce((a,s)=>a+mosPercent(s),0)/total);
  const triggers = stocks.filter(s=>getZone(s)==='sbuy').length;
  document.getElementById('summary-row').innerHTML = `
    <div class="scard"><div class="sl">Stocks tracked</div><div class="sv">${total}</div><div class="ss">in watchlist</div></div>
    <div class="scard"><div class="sl">In buy zone</div><div class="sv" style="color:#3b6d11">${inBuyZone}</div><div class="ss">of ${total} stocks</div></div>
    <div class="scard"><div class="sl">Avg margin of safety</div><div class="sv">${avgMos}%</div><div class="ss">vs intrinsic value</div></div>
    <div class="scard"><div class="sl">Strong buy alerts</div><div class="sv" style="color:${triggers>0?'#E24B4A':'var(--color-text-secondary)'}">${triggers}</div><div class="ss">${triggers>0?'trigger active':'none active'}</div></div>
  `;
}

function render(){
  document.getElementById('stock-grid').innerHTML = stocks.map(renderCard).join('');
  renderSummary();
  document.getElementById('refresh-time').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function toggleCard(id){
  expanded[id] = !expanded[id];
  render();
}

function switchTab(id,tab,e){
  e.stopPropagation();
  ['zones','eps','thesis'].forEach(t=>{
    const el = document.getElementById(`tab-${t}-${id}`);
    if(el) el.style.display = t===tab?'block':'none';
  });
  document.querySelectorAll(`#tabs-${id} .tab-btn`).forEach((b,i)=>{
    b.classList.toggle('active',['zones','eps','thesis'][i]===tab);
  });
}

function refreshPrices(){
  stocks.forEach(s=>{ s.cmp = s.cmp + (Math.random()-0.5)*2|0; });
  render();
  document.getElementById('refresh-time').textContent = 'Refreshed: ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function addStock(){
  const name = document.getElementById('f-name').value.trim();
  const ticker = document.getElementById('f-ticker').value.trim();
  if(!name||!ticker){ alert('Stock name and ticker are required.'); return; }
  const cmp = +document.getElementById('f-cmp').value||0;
  const iv = +document.getElementById('f-iv').value||cmp;
  const sbuy = +document.getElementById('f-sbuy').value||Math.round(cmp*0.8);
  const buy = +document.getElementById('f-buy').value||Math.round(cmp*0.9);
  const hold = +document.getElementById('f-hold').value||Math.round(cmp*1.2);
  const eps26 = +document.getElementById('f-eps26').value||0;
  const eps27 = +document.getElementById('f-eps27').value||0;
  const eps28 = +document.getElementById('f-eps28').value||0;
  stocks.push({
    id: Date.now()+'', name, ticker, sector:'Watchlist',
    cmp, iv, sbuy, buy, hold, avoid:Math.round(hold*1.1),
    eps:{fy26:eps26,fy27b:eps27,fy27bull:+(eps27*1.1).toFixed(2),fy27bear:+(eps27*0.9).toFixed(2),fy28b:eps28,fy28bull:+(eps28*1.1).toFixed(2),fy28bear:+(eps28*0.9).toFixed(2),fy29b:+(eps28*1.15).toFixed(2)},
    div:0, roce:0, roe:0, debt:'—', conviction:+document.getElementById('f-conv').value||3,
    verdict:'hold',
    thesis:document.getElementById('f-thesis').value||'Watchlist position.',
    bulls:['User-added stock — add conviction notes in thesis'], bears:['No risks added yet'],
    catalyst:'Monitor quarterly results',
    peRange:{low:15,mid:20,high:25}
  });
  closeModal();
  render();
  ['f-name','f-ticker','f-cmp','f-iv','f-sbuy','f-buy','f-hold','f-eps26','f-eps27','f-eps28','f-thesis'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
}

function deleteStock(id){
  stocks = stocks.filter(s=>s.id!==id);
  delete expanded[id];
  render();
}

render();
window.addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });
</script>
