
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakesh's Value Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;font-size:15px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* LAYOUT */
.page{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:600;color:#111}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.topbar-right{display:flex;gap:8px}
.btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#333;display:inline-flex;align-items:center;gap:6px;transition:background 0.15s}
.btn:hover{background:#f0f0f0}
.btn.green{background:#2a7a3b;border-color:#2a7a3b;color:#fff}
.btn.green:hover{background:#236632}

/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.sc{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px}
.sc-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.sc-val{font-size:26px;font-weight:600;color:#111}
.sc-sub{font-size:11px;color:#888;margin-top:2px}
.sc-val.green{color:#2a7a3b} .sc-val.red{color:#c8371a} .sc-val.amber{color:#c07a00}

/* STOCK CARDS */
.stock-list{display:flex;flex-direction:column;gap:12px}
.scard{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden}
.scard-header{padding:16px 20px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.scard-header:hover{background:#fafafa}
.scard-left{flex:1;min-width:200px}
.scard-name{font-size:16px;font-weight:600;color:#111;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.scard-meta{font-size:12px;color:#888;margin-top:3px}
.scard-right{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.scard-price{text-align:right}
.cmp-val{font-size:22px;font-weight:600;color:#111}
.cmp-sub{font-size:11px;color:#888;margin-top:2px}

/* VERDICT BADGES */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;white-space:nowrap}
.badge-sbuy{background:#d4edda;color:#155724}
.badge-buy{background:#d4f1e4;color:#1a6b3a}
.badge-acc{background:#fff3cd;color:#856404}
.badge-hold{background:#f0f0f0;color:#666}
.badge-avoid{background:#f8d7da;color:#721c24}

/* ALERT STRIP */
.alert-strip{padding:8px 20px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.alert-fire{background:#fff3cd;color:#856404;border-top:1px solid #ffeaa7}
.alert-buy{background:#d4edda;color:#155724;border-top:1px solid #c3e6cb}
.alert-watch{background:#f8f8f8;color:#666;border-top:1px solid #eee}

/* ZONE BAR */
.zone-wrap{padding:0 20px 14px}
.zone-labels{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:6px}
.zone-bar{position:relative;height:10px;border-radius:5px;background:#eee;overflow:visible}
.zone-seg{position:absolute;top:0;height:100%}
.zone-needle{position:absolute;top:-5px;width:4px;height:20px;border-radius:2px;transform:translateX(-50%);z-index:3}
.zone-needle-label{position:absolute;top:18px;font-size:10px;font-weight:600;transform:translateX(-50%);white-space:nowrap}

/* EXPANDED CONTENT */
.scard-body{border-top:1px solid #f0f0f0;display:none}
.scard-body.open{display:block}
.tabs{display:flex;gap:2px;padding:12px 20px 0;border-bottom:1px solid #f0f0f0}
.tab-btn{background:none;border:none;padding:8px 16px;font-size:13px;cursor:pointer;color:#888;border-radius:6px 6px 0 0;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn.active{color:#1a1a1a;font-weight:600;border-bottom-color:#111;background:#fff}
.tab-content{display:none;padding:16px 20px}
.tab-content.active{display:block}

/* DETAIL GRID */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-col{}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.detail-row:last-child{border-bottom:none}
.dl{color:#888} .dv{font-weight:500;text-align:right}
.dv.green{color:#2a7a3b} .dv.blue{color:#1a4c8a} .dv.amber{color:#c07a00}

/* PRICE ZONES */
.price-zones{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.pz{border-radius:8px;padding:10px 12px;text-align:center;border:1.5px solid transparent}
.pz-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}
.pz-val{font-size:14px;font-weight:600}
.pz-sbuy{background:#d4edda} .pz-sbuy .pz-label,.pz-sbuy .pz-val{color:#155724}
.pz-buy{background:#e8f5e9} .pz-buy .pz-label,.pz-buy .pz-val{color:#2a7a3b}
.pz-hold{background:#fff8e1} .pz-hold .pz-label,.pz-hold .pz-val{color:#c07a00}
.pz-avoid{background:#fdecea} .pz-avoid .pz-label,.pz-avoid .pz-val{color:#c8371a}
.pz.active{border-color:currentColor}

/* EPS TABLE */
.eps-table{width:100%;border-collapse:collapse;font-size:13px}
.eps-table th{background:#f8f8f8;padding:8px 10px;text-align:left;font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.eps-table td{padding:8px 10px;border-bottom:1px solid #f5f5f5;color:#333}
.eps-table td.g{color:#2a7a3b;font-weight:500} .eps-table td.a{color:#c07a00} .eps-table td.r{color:#c8371a}
.eps-table tr:last-child td{border-bottom:none}
.return-box{background:#f0f9f2;border:1px solid #c3e6cb;border-radius:8px;padding:14px 16px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.rb-label{font-size:12px;color:#555}
.rb-val{font-size:24px;font-weight:700;color:#2a7a3b}

/* THESIS */
.thesis-text{font-size:13px;color:#555;line-height:1.7;margin-bottom:12px;padding:12px;background:#fafafa;border-radius:8px;border-left:3px solid #ddd}
.bullet-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:12px 0 6px}
.bullet-list{list-style:none;padding:0}
.bullet-list li{display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:13px;color:#555;border-bottom:1px solid #f5f5f5;line-height:1.5}
.bullet-list li:last-child{border-bottom:none}
.bi{font-size:14px;flex-shrink:0;margin-top:1px}
.bi.bull{color:#2a7a3b} .bi.bear{color:#c07a00}

/* CONVICTION DOTS */
.conv-dots{display:flex;gap:3px}
.cdot{width:10px;height:10px;border-radius:50%;background:#e0e0e0}
.cdot.g{background:#2a7a3b} .cdot.a{background:#c07a00} .cdot.r{background:#c8371a}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-backdrop.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:520px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-box h2{font-size:17px;font-weight:600;margin-bottom:18px;color:#111}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;font-size:20px;color:#888;line-height:1}
.modal-close:hover{color:#333}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:#555}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;color:#111;background:#fff;outline:none;transition:border-color 0.15s}
.form-group input:focus,.form-group select,.form-group textarea:focus{border-color:#666}
.form-group textarea{height:68px;resize:vertical}
.form-hint{font-size:11px;color:#aaa;margin-top:1px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid #f0f0f0}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;padding:4px;border-radius:6px;font-size:16px}
.del-btn:hover{color:#c8371a;background:#fdecea}

/* CONVICTION SELECTOR */
.conv-select{display:flex;gap:6px}
.conv-opt{width:32px;height:32px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.conv-opt:hover{border-color:#2a7a3b;color:#2a7a3b}
.conv-opt.selected{background:#2a7a3b;border-color:#2a7a3b;color:#fff}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .price-zones{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
  .scard-right{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <h1>Rakesh's Value Dashboard</h1>
      <div class="topbar-sub" id="last-refresh">Loading prices...</div>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="refreshPrices()"><i class="ti ti-refresh"></i> Refresh</button>
      <button class="btn green" onclick="openModal()"><i class="ti ti-plus"></i> Add Stock</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary" id="summary"></div>

  <!-- STOCK LIST -->
  <div class="stock-list" id="stock-list"></div>

</div>

<!-- ADD STOCK MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <h2>Add stock to watchlist</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Stock name *</label>
        <input id="f-name" placeholder="e.g. HDFC Bank Ltd" />
      </div>
      <div class="form-group">
        <label>Ticker / Exchange code *</label>
        <input id="f-ticker" placeholder="e.g. HDFCBANK.NS" />
        <span class="form-hint">NSE: SYMBOL.NS &nbsp;|&nbsp; BSE: CODE.BO</span>
      </div>
      <div class="form-group">
        <label>Sector</label>
        <select id="f-sector">
          <option value="Banking">Banking</option>
          <option value="FMCG / Personal Care">FMCG / Personal Care</option>
          <option value="Auto Components">Auto Components</option>
          <option value="IT / Technology">IT / Technology</option>
          <option value="Pharma">Pharma</option>
          <option value="Capital Goods">Capital Goods</option>
          <option value="Energy">Energy</option>
          <option value="Metals">Metals</option>
          <option value="Telecom / Utilities">Telecom / Utilities</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Current market price ₹ *</label>
        <input id="f-cmp" type="number" placeholder="e.g. 1650" />
      </div>
      <div class="form-group">
        <label>Intrinsic value estimate ₹</label>
        <input id="f-iv" type="number" placeholder="e.g. 2100" />
        <span class="form-hint">Your DCF / PE-based fair value</span>
      </div>
      <div class="form-group">
        <label>Strong buy trigger ₹</label>
        <input id="f-sbuy" type="number" placeholder="e.g. 1400" />
        <span class="form-hint">Heavy buy alert fires below this</span>
      </div>
      <div class="form-group">
        <label>Buy zone upper limit ₹</label>
        <input id="f-buy" type="number" placeholder="e.g. 1580" />
      </div>
      <div class="form-group">
        <label>Accumulate / Hold zone ₹</label>
        <input id="f-hold" type="number" placeholder="e.g. 1950" />
      </div>
      <div class="form-group">
        <label>FY26 EPS ₹ (actual)</label>
        <input id="f-eps26" type="number" placeholder="e.g. 95" />
      </div>
      <div class="form-group">
        <label>FY27E EPS ₹ (estimate)</label>
        <input id="f-eps27" type="number" placeholder="e.g. 110" />
      </div>
      <div class="form-group">
        <label>FY28E EPS ₹ (estimate)</label>
        <input id="f-eps28" type="number" placeholder="e.g. 128" />
      </div>
      <div class="form-group">
        <label>Target PE multiple</label>
        <input id="f-pe" type="number" placeholder="e.g. 20" />
        <span class="form-hint">Used to calculate price targets</span>
      </div>
      <div class="form-group form-full">
        <label>Conviction level (1 = low, 5 = highest)</label>
        <div class="conv-select" id="conv-select">
          <button class="conv-opt" data-v="1" onclick="setConv(1)">1</button>
          <button class="conv-opt" data-v="2" onclick="setConv(2)">2</button>
          <button class="conv-opt" data-v="3" onclick="setConv(3,this)">3</button>
          <button class="conv-opt" data-v="4" onclick="setConv(4)">4</button>
          <button class="conv-opt" data-v="5" onclick="setConv(5)">5</button>
        </div>
      </div>
      <div class="form-group form-full">
        <label>Investment thesis</label>
        <textarea id="f-thesis" placeholder="Why you own this stock — one paragraph. Key moat, entry rationale, what you're watching."></textarea>
      </div>
      <div class="form-group form-full">
        <label>Key bull points (comma separated)</label>
        <textarea id="f-bulls" placeholder="e.g. Debt-free balance sheet, 38% ROCE, brand moat in niche categories"></textarea>
      </div>
      <div class="form-group form-full">
        <label>Key risk points (comma separated)</label>
        <textarea id="f-bears" placeholder="e.g. Revenue growth only 6% CAGR, seasonal weather risk, promoter pledge"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn green" onclick="addStock()"><i class="ti ti-plus"></i> Add to watchlist</button>
    </div>
  </div>
</div>

<script>
let selectedConv = 3;

const DEFAULT_STOCKS = [
  {
    id:'sgsil', name:'Saint-Gobain Sekurit India', ticker:'515043.BO', sector:'Auto Components',
    cmp:107, iv:145, sbuy:88, buy:108, hold:130, avoid:158,
    eps:{fy26:5.03, fy27b:5.90, fy28b:7.10, fy29b:8.50},
    peRange:{low:18,mid:22,high:27}, div:2.5, roce:22, roe:21, debt:'~Zero', conviction:4,
    thesis:'Debt-free auto glass specialist. Profit CAGR 39% over 5 years. Operating leverage on OEM premiumisation paying off. No one-off gains — fundamental margin expansion confirmed. Parent Saint-Gobain France backing with deep technology pipeline.',
    bulls:['PAT grew 27% in FY26 on 17% revenue growth — pure operating leverage','Gross margin structurally expanding — input costs easing','SUV/EV mix shift = higher revenue per car without volume dependency','Parent Saint-Gobain India committing ₹6,000–8,000 Cr capex in India'],
    bears:['AIS holds 70%+ market share — structural ceiling on growth','Single plant Chakan — zero geographic hedge','Working capital days ballooned to 336 — CFO cash conversion risk','No broker coverage — micro-cap illiquidity']
  },
  {
    id:'emami', name:'Emami Limited', ticker:'EMAMILTD.NS', sector:'FMCG / Personal Care',
    cmp:432, iv:650, sbuy:390, buy:445, hold:530, avoid:700,
    eps:{fy26:17.76, fy27b:20.5, fy28b:24.5, fy29b:29.0},
    peRange:{low:20,mid:27,high:35}, div:10, roce:38, roe:29, debt:'~Zero', conviction:3,
    thesis:'7 category-leading Ayurvedic brands at trough PE of 24x vs 5Y average of 35–40x. FY26 soft due to weather + West Asia disruption — not structural. Gross margin 69.9% intact. AA- credit rating from CARE and CRISIL. Mutual funds increasing holding.',
    bulls:['AA- credit rating (CARE + CRISIL) — independently certified quality','Gross margin expanded 130bps to 69.9% even in weak revenue year','MF holding rose 21.87% → 22.97% — institutions buying the dip','Dividend raised to ₹10 in a soft year — management conviction signal'],
    bears:['5Y revenue CAGR only 5-6% — below premium FMCG expectation','FY26 revenue declined 0.8% — first decline in 5+ years','IncNut + Axiom acquisitions loss-making — integration risk','West Asia geopolitical hit to 18% international revenues']
  }
];

let stocks = JSON.parse(localStorage.getItem('rs_stocks') || 'null') || DEFAULT_STOCKS;
let expanded = {};
let activeTab = {};

function save(){ localStorage.setItem('rs_stocks', JSON.stringify(stocks)); }

function getZone(s){
  if(s.cmp <= s.sbuy) return 'sbuy';
  if(s.cmp <= s.buy) return 'buy';
  if(s.cmp <= s.hold) return 'hold';
  return 'avoid';
}

function mos(s){ return Math.round(((s.iv - s.cmp)/s.iv)*100); }
function pe(s,eps){ return eps>0 ? (s.cmp/eps).toFixed(1) : '—'; }
function tgt(eps,mid){ return eps>0 ? Math.round(eps*mid) : '—'; }
function upside(s){ const t=tgt(s.eps.fy28b,s.peRange.mid); return t>0?Math.round(((t-s.cmp)/s.cmp)*100):'—'; }

function badgeCls(z){ return {sbuy:'badge-sbuy',buy:'badge-buy',hold:'badge-acc',avoid:'badge-avoid'}[z]||'badge-hold'; }
function badgeLbl(z){ return {sbuy:'Strong Buy',buy:'Buy',hold:'Accumulate',avoid:'Reduce'}[z]||'Hold'; }

function convDots(n){
  let h='';
  for(let i=1;i<=5;i++){
    const cls=i<=n?(n>=4?'g':n>=3?'a':'r'):'';
    h+=`<div class="cdot ${cls}"></div>`;
  }
  return `<div class="conv-dots">${h}</div>`;
}

function alertHTML(s){
  const z=getZone(s);
  if(z==='sbuy') return `<div class="alert-strip alert-fire"><i class="ti ti-bell-ringing"></i> Heavy buy trigger ACTIVE — CMP ₹${s.cmp} is at or below Strong Buy ₹${s.sbuy}</div>`;
  if(z==='buy') return `<div class="alert-strip alert-buy"><i class="ti ti-circle-check"></i> In buy zone — CMP ₹${s.cmp} ≤ Buy upper ₹${s.buy}</div>`;
  const pct=Math.round(((s.cmp-s.sbuy)/s.cmp)*100);
  return `<div class="alert-strip alert-watch"><i class="ti ti-arrow-down"></i> ${pct}% away from Strong Buy trigger ₹${s.sbuy} &nbsp;|&nbsp; IV ₹${s.iv} · MoS ${mos(s)}%</div>`;
}

function zoneBarHTML(s){
  const lo=Math.min(s.sbuy*0.82, s.cmp*0.85);
  const hi=Math.max(s.avoid*1.08, s.cmp*1.1);
  const r=hi-lo;
  const pct=v=>Math.min(99.5,Math.max(0.5,((v-lo)/r*100))).toFixed(1);
  const sbP=pct(s.sbuy), bP=pct(s.buy), hP=pct(s.hold), avP=pct(s.avoid);
  const cP=pct(s.cmp), ivP=pct(s.iv);
  return `
<div class="zone-wrap">
  <div class="zone-labels"><span>₹${Math.round(lo)}</span><span style="font-size:11px;color:#aaa">Price zones</span><span>₹${Math.round(hi)}</span></div>
  <div class="zone-bar" style="height:10px;border-radius:5px;background:#eee;position:relative;overflow:visible">
    <div style="position:absolute;left:0;width:${sbP}%;height:100%;background:#c3e6cb;border-radius:5px 0 0 5px"></div>
    <div style="position:absolute;left:${sbP}%;width:${bP-sbP}%;height:100%;background:#d4f1e4"></div>
    <div style="position:absolute;left:${bP}%;width:${hP-bP}%;height:100%;background:#fff3cd"></div>
    <div style="position:absolute;left:${hP}%;width:${100-hP}%;height:100%;background:#f8d7da;border-radius:0 5px 5px 0"></div>
    <div style="position:absolute;left:${cP}%;top:-5px;width:4px;height:20px;background:#111;border-radius:2px;transform:translateX(-50%);z-index:3">
      <div style="position:absolute;top:22px;font-size:10px;font-weight:700;color:#111;transform:translateX(-50%);white-space:nowrap">₹${s.cmp}</div>
    </div>
    <div style="position:absolute;left:${ivP}%;top:-3px;width:3px;height:16px;background:#1a4c8a;opacity:0.7;border-radius:2px;transform:translateX(-50%);z-index:2">
      <div style="position:absolute;top:18px;font-size:10px;font-weight:600;color:#1a4c8a;transform:translateX(-50%);white-space:nowrap">IV ₹${s.iv}</div>
    </div>
  </div>
</div>`;
}

function renderCard(s){
  const z=getZone(s);
  const isOpen=expanded[s.id]||false;
  const tab=activeTab[s.id]||'zones';
  const pzActive=(zone,target)=>zone===target?' active':'';

  return `
<div class="scard" id="card-${s.id}">
  <div class="scard-header" onclick="toggleCard('${s.id}')">
    <div class="scard-left">
      <div class="scard-name">
        ${s.name}
        <span class="badge ${badgeCls(z)}">${badgeLbl(z)}</span>
      </div>
      <div class="scard-meta">${s.ticker} &nbsp;·&nbsp; ${s.sector}</div>
    </div>
    <div class="scard-right">
      <div class="scard-price">
        <div class="cmp-val">₹${s.cmp}</div>
        <div class="cmp-sub">MoS ${mos(s)}% &nbsp;·&nbsp; IV ₹${s.iv}</div>
      </div>
      ${convDots(s.conviction)}
      <button class="del-btn" onclick="event.stopPropagation();deleteStock('${s.id}')" title="Remove stock"><i class="ti ti-trash"></i></button>
      <i class="ti ${isOpen?'ti-chevron-up':'ti-chevron-down'}" style="font-size:16px;color:#aaa;margin-top:4px"></i>
    </div>
  </div>

  ${alertHTML(s)}
  ${zoneBarHTML(s)}

  <div class="scard-body ${isOpen?'open':''}">
    <div class="tabs">
      <button class="tab-btn ${tab==='zones'?'active':''}" onclick="switchTab('${s.id}','zones',event)">Zones & Metrics</button>
      <button class="tab-btn ${tab==='eps'?'active':''}" onclick="switchTab('${s.id}','eps',event)">EPS & Price Targets</button>
      <button class="tab-btn ${tab==='thesis'?'active':''}" onclick="switchTab('${s.id}','thesis',event)">Thesis & Risks</button>
    </div>

    <div class="tab-content ${tab==='zones'?'active':''}">
      <div class="price-zones">
        <div class="pz pz-sbuy${pzActive(z,'sbuy')}"><div class="pz-label">Strong Buy</div><div class="pz-val">≤ ₹${s.sbuy}</div></div>
        <div class="pz pz-buy${pzActive(z,'buy')}"><div class="pz-label">Buy Zone</div><div class="pz-val">₹${s.sbuy+1}–${s.buy}</div></div>
        <div class="pz pz-hold${pzActive(z,'hold')}"><div class="pz-label">Accumulate</div><div class="pz-val">₹${s.buy+1}–${s.hold}</div></div>
        <div class="pz pz-avoid${pzActive(z,'avoid')}"><div class="pz-label">Reduce</div><div class="pz-val">> ₹${s.hold}</div></div>
      </div>
      <div class="detail-grid">
        <div class="detail-col" style="padding-right:16px">
          <div class="detail-row"><span class="dl">Current price</span><span class="dv">₹${s.cmp}</span></div>
          <div class="detail-row"><span class="dl">Intrinsic value</span><span class="dv blue">₹${s.iv}</span></div>
          <div class="detail-row"><span class="dl">Margin of safety</span><span class="dv green">${mos(s)}%</span></div>
          <div class="detail-row"><span class="dl">Dividend (FY26)</span><span class="dv">₹${s.div}/share</span></div>
        </div>
        <div class="detail-col" style="padding-left:16px;border-left:1px solid #f5f5f5">
          <div class="detail-row"><span class="dl">ROCE</span><span class="dv">~${s.roce}%</span></div>
          <div class="detail-row"><span class="dl">ROE</span><span class="dv">~${s.roe}%</span></div>
          <div class="detail-row"><span class="dl">Debt / Equity</span><span class="dv">${s.debt}</span></div>
          <div class="detail-row"><span class="dl">Conviction</span><span class="dv">${s.conviction}/5</span></div>
        </div>
      </div>
    </div>

    <div class="tab-content ${tab==='eps'?'active':''}">
      <table class="eps-table">
        <thead>
          <tr><th>Year</th><th>EPS (Base)</th><th>PE at CMP ₹${s.cmp}</th><th>Target @ ${s.peRange.mid}x PE</th><th>Upside from ₹${s.cmp}</th></tr>
        </thead>
        <tbody>
          <tr><td>FY26 ✓ Actual</td><td class="g">₹${s.eps.fy26}</td><td class="a">${pe(s,s.eps.fy26)}x</td><td>₹${tgt(s.eps.fy26,s.peRange.mid)}</td><td class="${tgt(s.eps.fy26,s.peRange.mid)>s.cmp?'g':'r'}">${tgt(s.eps.fy26,s.peRange.mid)>0?Math.round(((tgt(s.eps.fy26,s.peRange.mid)-s.cmp)/s.cmp)*100)+'%':'—'}</td></tr>
          <tr><td>FY27E</td><td class="g">₹${s.eps.fy27b}</td><td class="g">${pe(s,s.eps.fy27b)}x</td><td>₹${tgt(s.eps.fy27b,s.peRange.mid)}</td><td class="g">${tgt(s.eps.fy27b,s.peRange.mid)>0?Math.round(((tgt(s.eps.fy27b,s.peRange.mid)-s.cmp)/s.cmp)*100)+'%':'—'}</td></tr>
          <tr><td>FY28E</td><td class="g">₹${s.eps.fy28b}</td><td class="g">${pe(s,s.eps.fy28b)}x</td><td>₹${tgt(s.eps.fy28b,s.peRange.mid)}</td><td class="g">${tgt(s.eps.fy28b,s.peRange.mid)>0?Math.round(((tgt(s.eps.fy28b,s.peRange.mid)-s.cmp)*100/s.cmp))+'%':'—'}</td></tr>
          <tr><td>FY29E</td><td class="g">₹${s.eps.fy29b}</td><td class="g">${pe(s,s.eps.fy29b)}x</td><td>₹${tgt(s.eps.fy29b,s.peRange.mid)}</td><td class="g">${tgt(s.eps.fy29b,s.peRange.mid)>0?Math.round(((tgt(s.eps.fy29b,s.peRange.mid)-s.cmp)*100/s.cmp))+'%':'—'}</td></tr>
        </tbody>
      </table>
      <div class="return-box">
        <div><div class="rb-label">3-year base case return (FY28E @ ${s.peRange.mid}x PE)</div><div style="font-size:11px;color:#888;margin-top:2px">Target ₹${tgt(s.eps.fy28b,s.peRange.mid)} · PE range ${s.peRange.low}x–${s.peRange.high}x</div></div>
        <div class="rb-val">+${upside(s)}%</div>
      </div>
    </div>

    <div class="tab-content ${tab==='thesis'?'active':''}">
      <div class="thesis-text">${s.thesis}</div>
      <div class="bullet-section-title">Bull case</div>
      <ul class="bullet-list">${s.bulls.map(b=>`<li><i class="ti ti-circle-check bi bull"></i>${b}</li>`).join('')}</ul>
      <div class="bullet-section-title">Bear case / risks</div>
      <ul class="bullet-list">${s.bears.map(b=>`<li><i class="ti ti-alert-triangle bi bear"></i>${b}</li>`).join('')}</ul>
    </div>
  </div>
</div>`;
}

function renderSummary(){
  const n=stocks.length;
  const inBuy=stocks.filter(s=>['sbuy','buy'].includes(getZone(s))).length;
  const avgMos=n>0?Math.round(stocks.reduce((a,s)=>a+mos(s),0)/n):0;
  const triggers=stocks.filter(s=>getZone(s)==='sbuy').length;
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sc-label">Stocks tracked</div><div class="sc-val">${n}</div><div class="sc-sub">in watchlist</div></div>
    <div class="sc"><div class="sc-label">In buy zone</div><div class="sc-val green">${inBuy}</div><div class="sc-sub">of ${n} stocks</div></div>
    <div class="sc"><div class="sc-label">Avg margin of safety</div><div class="sc-val">${avgMos}%</div><div class="sc-sub">vs intrinsic value</div></div>
    <div class="sc"><div class="sc-label">Strong buy alerts</div><div class="sc-val ${triggers>0?'red amber':''}">${triggers}</div><div class="sc-sub">${triggers>0?'trigger active':'none active'}</div></div>
  `;
}

function render(){
  document.getElementById('stock-list').innerHTML=stocks.map(renderCard).join('');
  renderSummary();
}

function toggleCard(id){ expanded[id]=!expanded[id]; render(); }

function switchTab(id,tab,e){
  e.stopPropagation();
  activeTab[id]=tab;
  render();
}

function deleteStock(id){
  if(!confirm('Remove this stock from your watchlist?')) return;
  stocks=stocks.filter(s=>s.id!==id);
  delete expanded[id]; delete activeTab[id];
  save(); render();
}

function setConv(n){
  selectedConv=n;
  document.querySelectorAll('.conv-opt').forEach(b=>{ b.classList.toggle('selected', +b.dataset.v===n); });
}

function openModal(){
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow='';
}
function handleBackdropClick(e){ if(e.target===document.getElementById('modal-backdrop')) closeModal(); }

function addStock(){
  const name=document.getElementById('f-name').value.trim();
  const ticker=document.getElementById('f-ticker').value.trim();
  if(!name||!ticker){ alert('Stock name and ticker are required.'); return; }
  const cmp=+document.getElementById('f-cmp').value||0;
  const iv=+document.getElementById('f-iv').value||(cmp*1.3);
  const sbuy=+document.getElementById('f-sbuy').value||Math.round(cmp*0.78);
  const buy=+document.getElementById('f-buy').value||Math.round(cmp*0.92);
  const hold=+document.getElementById('f-hold').value||Math.round(cmp*1.2);
  const eps26=+document.getElementById('f-eps26').value||0;
  const eps27=+document.getElementById('f-eps27').value||0;
  const eps28=+document.getElementById('f-eps28').value||0;
  const pe=+document.getElementById('f-pe').value||20;
  const sector=document.getElementById('f-sector').value;
  const thesis=document.getElementById('f-thesis').value||'Watchlist position.';
  const bullsRaw=document.getElementById('f-bulls').value;
  const bearsRaw=document.getElementById('f-bears').value;
  const bulls=bullsRaw?bullsRaw.split(',').map(b=>b.trim()).filter(Boolean):['No bull points added yet'];
  const bears=bearsRaw?bearsRaw.split(',').map(b=>b.trim()).filter(Boolean):['No risks added yet'];

  stocks.push({
    id:'s_'+Date.now(), name, ticker, sector,
    cmp, iv, sbuy, buy, hold, avoid:Math.round(hold*1.1),
    eps:{fy26:eps26, fy27b:eps27, fy28b:eps28, fy29b:+(eps28*1.15).toFixed(1)},
    peRange:{low:Math.round(pe*0.8), mid:pe, high:Math.round(pe*1.25)},
    div:0, roce:0, roe:0, debt:'—', conviction:selectedConv,
    thesis, bulls, bears
  });
  save();
  closeModal();
  render();
  ['f-name','f-ticker','f-cmp','f-iv','f-sbuy','f-buy','f-hold','f-eps26','f-eps27','f-eps28','f-pe','f-thesis','f-bulls','f-bears'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  setConv(3);
}

async function fetchPrice(ticker){
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    const r=await fetch(url);
    const d=await r.json();
    const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
    return p?Math.round(p*100)/100:null;
  } catch(e){ return null; }
}

async function refreshPrices(){
  document.getElementById('last-refresh').textContent='Fetching live prices...';
  let updated=0;
  for(let s of stocks){
    if(s.ticker&&s.ticker!=='—'){
      const p=await fetchPrice(s.ticker);
      if(p&&p>0){ s.cmp=p; updated++; }
    }
  }
  save(); render();
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-refresh').textContent=`Live prices fetched — ${updated} updated · ${now} IST`;
}

render();
setConv(3);
refreshPrices();
setInterval(refreshPrices, 5*60*1000);
</script>
</body>
</html>
